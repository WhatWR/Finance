<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FN Final Study Guide</title>
  <style>
    :root {
      --sidebar-bg: #0f111a;
      --sidebar-border: #1e2235;
      --text-main: #e2e8f0;
      --text-muted: #94a3b8;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --item-hover: rgba(99, 102, 241, 0.1);
      --app-bg: #f8fafc;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Sukhumvit Set", "Noto Sans Thai", sans-serif;
    }

    body {
      display: flex;
      height: 100vh;
      overflow: hidden;
      background-color: var(--app-bg);
    }

    /* Sidebar Styles */
    .sidebar {
      width: 280px;
      min-width: 280px;
      background-color: var(--sidebar-bg);
      border-right: 1px solid var(--sidebar-border);
      display: flex;
      flex-direction: column;
      color: var(--text-main);
      box-shadow: 4px 0 20px rgba(0, 0, 0, 0.1);
      z-index: 10;
      transition: transform 0.3s ease;
    }

    .sidebar-header {
      padding: 24px 20px;
      border-bottom: 1px solid var(--sidebar-border);
    }

    .sidebar-header h1 {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, #818cf8, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 4px;
    }

    .sidebar-header p {
      font-size: 13px;
      color: var(--text-muted);
    }

    .nav-menu {
      flex: 1;
      overflow-y: auto;
      padding: 20px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 12px;
      cursor: pointer;
      color: var(--text-muted);
      text-decoration: none;
      transition: all 0.2s ease;
      border: 1px solid transparent;
    }

    .nav-item:hover {
      background-color: var(--item-hover);
      color: var(--text-main);
    }

    .nav-item.active {
      background-color: var(--item-hover);
      color: #fff;
      border-color: rgba(99, 102, 241, 0.3);
      box-shadow: inset 0 0 12px rgba(99, 102, 241, 0.1);
    }

    .nav-icon {
      font-size: 18px;
      width: 24px;
      text-align: center;
    }

    .nav-text {
      font-size: 14px;
      font-weight: 500;
    }

    .nav-badge {
      margin-left: auto;
      font-size: 11px;
      background: rgba(255, 255, 255, 0.1);
      padding: 2px 8px;
      border-radius: 20px;
    }

    /* Main Content Area */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .mobile-header {
      display: none;
      padding: 16px 20px;
      background: var(--sidebar-bg);
      color: white;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid var(--sidebar-border);
    }

    .menu-toggle {
      background: none;
      border: none;
      color: white;
      font-size: 24px;
      cursor: pointer;
    }

    .mobile-title {
      font-weight: 600;
      font-size: 16px;
      background: linear-gradient(135deg, #818cf8, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .frame-container {
      flex: 1;
      width: 100%;
      height: 100%;
      background: var(--app-bg);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* Loading Overlay */
    .loader {
      position: absolute;
      inset: 0;
      background: rgba(248, 250, 252, 0.8);
      backdrop-filter: blur(4px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 5;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .loader.active {
      opacity: 1;
      pointer-events: all;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(99, 102, 241, 0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    /* Overlay for mobile */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 9;
      backdrop-filter: blur(2px);
    }

    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        transform: translateX(-100%);
      }
      .sidebar.open {
        transform: translateX(0);
      }
      .mobile-header {
        display: flex;
      }
      .sidebar-overlay.active {
        display: block;
      }
    }
  </style>
</head>
<body>

  <!-- Mobile Overlay -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1>FN Final Study</h1>
      <p>Interactive Tutorials</p>
    </div>
    <div class="nav-menu">
      <a href="#" class="nav-item active" data-src="Bond_Interactive_Tutorial.html">
        <span class="nav-icon">📈</span>
        <span class="nav-text">Ch5: Bond Valuation</span>
        <span class="nav-badge">Ch5</span>
      </a>
      <a href="#" class="nav-item" data-src="Ch6_Risk_Tutorial.html">
        <span class="nav-icon">📊</span>
        <span class="nav-text">Ch6: Risk & Return</span>
        <span class="nav-badge">Ch6</span>
      </a>
      <a href="#" class="nav-item" data-src="Ch7_Stock_Tutorial.html">
        <span class="nav-icon">💹</span>
        <span class="nav-text">Ch7: Stock Valuation</span>
        <span class="nav-badge">Ch7</span>
      </a>
      <a href="#" class="nav-item" data-src="Ch8_WACC_Tutorial.html">
        <span class="nav-icon">⚖️</span>
        <span class="nav-text">Ch8: WACC</span>
        <span class="nav-badge">Ch8</span>
      </a>
      <a href="#" class="nav-item" data-src="Ch9_Budgeting_Tutorial.html">
        <span class="nav-icon">🏗️</span>
        <span class="nav-text">Ch9: Budgeting</span>
        <span class="nav-badge">Ch9</span>
      </a>
      <a href="#" class="nav-item" data-src="Ch10_CashFlow_Tutorial.html">
        <span class="nav-icon">💰</span>
        <span class="nav-text">Ch10: Cash Flow</span>
        <span class="nav-badge">Ch10</span>
      </a>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <div class="mobile-header">
      <button class="menu-toggle" id="menuToggle">☰</button>
      <div class="mobile-title">FN Final Study</div>
    </div>
    
    <div class="loader" id="loader">
      <div class="spinner"></div>
    </div>
    
    <div class="frame-container">
      <iframe id="contentFrame" src="Bond_Interactive_Tutorial.html" title="Study Content"></iframe>
    </div>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const navItems = document.querySelectorAll('.nav-item');
      const contentFrame = document.getElementById('contentFrame');
      const loader = document.getElementById('loader');
      
      const sidebar = document.getElementById('sidebar');
      const sidebarOverlay = document.getElementById('sidebarOverlay');
      const menuToggle = document.getElementById('menuToggle');

      // Navigation Logic
      navItems.forEach(item => {
        item.addEventListener('click', (e) => {
          e.preventDefault();
          
          // Update active state
          navItems.forEach(nav => nav.classList.remove('active'));
          item.classList.add('active');
          
          // Load new content
          const newSrc = item.getAttribute('data-src');
          if (contentFrame.src !== newSrc) {
            loader.classList.add('active');
            contentFrame.src = newSrc;
          }

          // Close sidebar on mobile after clicking
          if (window.innerWidth <= 768) {
            closeSidebar();
          }
        });
      });

      // Hide loader when iframe finishes loading
      contentFrame.addEventListener('load', () => {
        loader.classList.remove('active');
        
        // Try to inject some CSS to hide the "กลับหน้ารวม" back button inside the iframe if possible
        try {
          const iframeDoc = contentFrame.contentDocument || contentFrame.contentWindow.document;
          const style = iframeDoc.createElement('style');
          // Hide the specific back button class since we have a main navigation now
          style.innerHTML = '.nav-back { display: none !important; }';
          iframeDoc.head.appendChild(style);
        } catch (e) {
          // Ignore cross-origin errors if run locally without server (file:// protocol)
          console.log("Could not inject CSS into iframe. This is normal for file:// protocol.");
        }
      });

      // Mobile Menu Logic
      function openSidebar() {
        sidebar.classList.add('open');
        sidebarOverlay.classList.add('active');
      }

      function closeSidebar() {
        sidebar.classList.remove('open');
        sidebarOverlay.classList.remove('active');
      }

      menuToggle.addEventListener('click', openSidebar);
      sidebarOverlay.addEventListener('click', closeSidebar);
    });
  </script>
</body>
</html>
